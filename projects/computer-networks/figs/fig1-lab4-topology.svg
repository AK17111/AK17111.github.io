<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#4f8cff"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="800" height="260" fill="#0d1117"/>

  <circle cx="120" cy="130" r="55" fill="#1c2129" stroke="#2d333b"/>
  <text x="120" y="122" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Client A</text>
  <text x="120" y="142" text-anchor="middle" fill="#9aa4b2" font-size="12">sender</text>

  <rect x="345" y="90" width="110" height="80" rx="10" fill="#161b22" stroke="#4f8cff" stroke-width="1.5"/>
  <text x="400" y="125" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="700">Router 1</text>
  <text x="400" y="146" text-anchor="middle" fill="#9aa4b2" font-size="11">random loss (p)</text>

  <circle cx="680" cy="130" r="55" fill="#1c2129" stroke="#2d333b"/>
  <text x="680" y="122" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="700">Client B</text>
  <text x="680" y="142" text-anchor="middle" fill="#9aa4b2" font-size="12">receiver</text>

  <line x1="175" y1="120" x2="345" y2="120" stroke="#4f8cff" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="260" y="105" text-anchor="middle" fill="#9aa4b2" font-size="11">DATA (MSS=256B)</text>
  <line x1="345" y1="145" x2="175" y2="145" stroke="#9aa4b2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>
  <text x="260" y="163" text-anchor="middle" fill="#9aa4b2" font-size="11">cumulative + SACK ACKs</text>

  <line x1="455" y1="120" x2="625" y2="120" stroke="#4f8cff" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="625" y1="145" x2="455" y2="145" stroke="#9aa4b2" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow2)"/>

  <text x="400" y="220" text-anchor="middle" fill="#9aa4b2" font-size="12">1s link latency each hop · packets dropped independently at the router with probability p</text>
</svg>
